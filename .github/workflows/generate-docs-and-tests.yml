name: Generate Docs and Tests

# Triggered when a spec YAML is merged to main, or manually via workflow_dispatch.
# Runs both generators in sequence and commits all outputs in one commit:
#   1. implementation/[event].md  — dev handoff doc (A3)
#   2. tests/playwright/[event].spec.js — Playwright test file (A4)

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**.yaml'

  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Path to spec YAML (e.g. specs/SPEC-2026-001-page_view.yaml)'
        required: true

jobs:
  generate:
    name: Generate docs and tests from spec
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install dependencies for both agents ────────────────────────────────
      - name: Install doc-generator dependencies
        run: |
          cd agents/doc-generator
          npm install

      - name: Install test-generator dependencies
        run: |
          cd agents/test-generator
          npm install

      # ── Resolve which spec files to process ─────────────────────────────────
      - name: Resolve spec files
        id: changed-specs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="${{ github.event.inputs.spec_file }}"
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^specs/.*\.yaml$' || true)
          fi
          echo "specs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Specs to process:"
          echo "$CHANGED"

      # ── A3: Generate implementation docs ────────────────────────────────────
      - name: Generate implementation docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r spec_file; do
            [ -z "$spec_file" ] && continue
            echo "→ Generating doc for: $spec_file"
            node agents/doc-generator/run.js "$spec_file"
          done <<< "${{ steps.changed-specs.outputs.specs }}"

      # ── A4: Generate Playwright tests ────────────────────────────────────────
      - name: Generate Playwright tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r spec_file; do
            [ -z "$spec_file" ] && continue
            echo "→ Generating test for: $spec_file"
            node agents/test-generator/run.js "$spec_file"
          done <<< "${{ steps.changed-specs.outputs.specs }}"

      # ── Commit all outputs in one commit ────────────────────────────────────
      - name: Commit generated files
        run: |
          git config user.name  "analytics-bot"
          git config user.email "analytics-bot@github-actions"

          git add implementation/
          git add tests/playwright/

          if git diff --staged --quiet; then
            echo "No files changed — nothing to commit."
          else
            git commit -m "chore: auto-generate docs and tests from spec [skip ci]"
            git push
          fi
