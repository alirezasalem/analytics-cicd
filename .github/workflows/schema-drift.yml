name: Schema Drift Detection

on:
  pull_request:
    branches:
      - main
    paths:
      - "specs/**"

jobs:
  schema-drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run schema drift diff
        id: diff
        run: |
          set +e
          OUTPUT=$(node agents/schema-guardian/diff.js 2>&1)
          EXIT_CODE=$?
          set -e

          {
            echo "comment<<SCHEMA_DRIFT_EOF"
            echo "$OUTPUT"
            echo "SCHEMA_DRIFT_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"

      - name: Post schema drift comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = `${{ steps.diff.outputs.comment }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🛡️ Schema Drift Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Fail on breaking changes
        if: steps.diff.outputs.exit_code != '0'
        run: |
          echo "❌ Breaking schema changes detected. PR is blocked."
          echo "To intentionally accept these changes, run the 'Update Schema Baseline' workflow after approval."
          exit 1
