name: Generate Playwright Tests

# Triggered when a spec YAML is merged to main, or manually via workflow_dispatch.
# Reads the spec → calls Claude API → writes tests/playwright/[event].spec.js
# and commits them back to main.

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**.yaml'

  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Path to spec YAML (e.g. specs/SPEC-2026-001-page_view.yaml)'
        required: true

jobs:
  generate-tests:
    name: Generate Playwright tests from spec
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test-generator dependencies
        run: |
          cd agents/test-generator
          npm ci

      # ── Resolve which spec files to process ─────────────────────────────────
      - name: Resolve spec files to process
        id: changed-specs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="${{ github.event.inputs.spec_file }}"
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^specs/.*\.yaml$' || true)
          fi
          echo "specs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found specs to process:"
          echo "$CHANGED"

      # ── Generate Playwright test files ──────────────────────────────────────
      - name: Generate Playwright test files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r spec_file; do
            [ -z "$spec_file" ] && continue
            echo "Processing: $spec_file"
            node agents/test-generator/run.js "$spec_file"
          done <<< "${{ steps.changed-specs.outputs.specs }}"

      # ── Commit generated test files back to main ────────────────────────────
      - name: Commit generated test files
        run: |
          git config user.name  "analytics-bot"
          git config user.email "analytics-bot@github-actions"

          git add tests/playwright/

          if git diff --staged --quiet; then
            echo "No test files changed — nothing to commit."
          else
            git commit -m "chore: auto-generate Playwright tests from spec [skip ci]"
            git push
          fi
