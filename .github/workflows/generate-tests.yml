name: A4 — Generate Playwright Tests

# Triggered when a spec YAML is merged to main.
# Reads the spec → calls Claude API → writes tests/playwright/[event].spec.js
# and commits them back to main alongside the spec.

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**.yaml'

jobs:
  generate-tests:
    name: Generate Playwright tests from spec
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit generated test files back to main

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test-generator dependencies
        run: |
          cd agents/test-generator
          npm ci

      - name: Detect changed spec files
        id: changed-specs
        run: |
          # Get list of .yaml files changed in this push
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^specs/.*\.yaml$' || true)
          echo "specs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found changed specs:"
          echo "$CHANGED"

      - name: Generate Playwright test files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r spec_file; do
            [ -z "$spec_file" ] && continue
            echo "Processing: $spec_file"
            node agents/test-generator/run.js "$spec_file"
          done <<< "${{ steps.changed-specs.outputs.specs }}"

      - name: Commit generated test files
        run: |
          git config user.name  "analytics-bot"
          git config user.email "analytics-bot@github-actions"

          git add tests/playwright/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No test files changed — nothing to commit."
          else
            git commit -m "chore(a4): auto-generate Playwright tests from spec [skip ci]"
            git push
          fi
