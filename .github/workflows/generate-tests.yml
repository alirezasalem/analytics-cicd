name: Generate Playwright dataLayer Test

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**.yaml'

  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Path to spec YAML (e.g. specs/SPEC-2026-001-page_view.yaml)'
        required: true

jobs:
  generate-tests:
    name: Generate Playwright tests from spec
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test-generator dependencies
        run: |
          cd agents/test-generator
          npm install

      - name: Resolve spec files
        id: changed-specs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="${{ github.event.inputs.spec_file }}"
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^specs/.*\.yaml$' || true)
          fi
          echo "specs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Specs to process:"
          echo "$CHANGED"

      - name: Generate Playwright tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r spec_file; do
            spec_file=$(echo "$spec_file" | tr -d '[:space:]')
            [ -z "$spec_file" ] && continue
            echo "→ Generating test for: $spec_file"
            node agents/test-generator/run.js "$spec_file"
          done <<< "${{ steps.changed-specs.outputs.specs }}"

      - name: Commit generated tests
        run: |
          git config user.name  "analytics-bot"
          git config user.email "analytics-bot@github-actions"
          git add playwright-datalayer-tests/
          if git diff --staged --quiet; then
            echo "No files changed — nothing to commit."
          else
            git commit -m "chore: auto-generate tests from spec [skip ci]"
            git pull --rebase origin main
            git push
          fi
