name: Update Schema Baseline

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why is this baseline update needed? (required for audit trail)"
        required: true
        type: string

jobs:
  update-baseline:
    name: Promote schema baseline
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate new baseline snapshot
        run: node agents/schema-guardian/snapshot.js

      - name: Commit and push updated baseline
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add schema-baseline.json

          if git diff --cached --quiet; then
            echo "No changes to baseline — already up to date."
            exit 0
          fi

          REASON="${{ github.event.inputs.reason }}"
          ACTOR="${{ github.actor }}"
          git commit -m "chore: update schema baseline [skip ci]

Approved by: $ACTOR
Reason: $REASON"

          git push origin HEAD:main --force-with-lease=HEAD

      - name: Confirm baseline update
        run: |
          echo "schema-baseline.json has been updated on main."
          echo "Approved by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo ""
          cat schema-baseline.json

