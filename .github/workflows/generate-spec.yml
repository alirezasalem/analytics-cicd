name: Generate Spec from Brief

on:
  push:
    paths:
      - "feature-briefs/FB-*.md"
  workflow_dispatch:
    inputs:
      brief_file:
        description: "Path to feature brief (e.g. feature-briefs/FB-002.md)"
        required: true
        type: string

jobs:
  generate-spec:
    name: Generate analytics spec
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm ci

      - name: Install agent dependencies
        working-directory: agents/spec-generator
        run: npm ci

      - name: Determine brief file
        id: brief
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "file=${{ inputs.brief_file }}" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'feature-briefs/' | grep '^feature-briefs/FB-.*\.md$' | head -1)
            echo "Detected brief file: $CHANGED"
            if [[ -z "$CHANGED" ]]; then
              echo "ERROR: No FB-*.md brief file detected in this commit"
              exit 1
            fi
            echo "file=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate spec YAML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BRIEF_FILE="${{ steps.brief.outputs.file }}"
          BRIEF_NUM=$(echo "$BRIEF_FILE" | grep -oP '(?<=FB-)\d+')
          YEAR=$(date +%Y)

          # Generate to a temp file first
          TEMP_FILE="specs/temp-spec.yaml"
          if ! node agents/spec-generator/run.js --brief-file "$BRIEF_FILE" > "$TEMP_FILE"; then
            echo "--- spec generator failed, file contents ---"
            cat "$TEMP_FILE"
            exit 1
          fi

          # Extract first event name from generated YAML
          EVENT_NAME=$(grep -m1 '^\s*- name:' "$TEMP_FILE" | sed 's/.*name:\s*//' | tr -d '"' | tr -d "'" | xargs)

          # Build final filename: SPEC-2026-002-click_outbound_navigation.yaml
          if [[ -n "$EVENT_NAME" ]]; then
            SPEC_FILE="specs/SPEC-${YEAR}-$(printf '%03d' $((10#$BRIEF_NUM)))-${EVENT_NAME}.yaml"
          else
            SPEC_FILE="specs/SPEC-${YEAR}-$(printf '%03d' $((10#$BRIEF_NUM))).yaml"
          fi

          mv "$TEMP_FILE" "$SPEC_FILE"
          # Fix spec_id to match actual filename
          SPEC_ID="${SPEC_FILE%.yaml}"
          SPEC_ID="${SPEC_ID#specs/}"
          sed -i "s/^spec_id:.*/spec_id: ${SPEC_ID}/" "$SPEC_FILE"
          echo "Brief : $BRIEF_FILE"
          echo "Event : $EVENT_NAME"
          echo "Output: $SPEC_FILE"
          echo "spec_file=$SPEC_FILE" >> "$GITHUB_ENV"

      - name: Open PR with generated spec
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "spec/auto-fb-${{ steps.brief.outputs.file }}"
          commit-message: "feat(spec): auto-generate ${{ env.spec_file }}"
          title: "Auto-spec: ${{ env.spec_file }}"
          body: |
            ## Auto-generated spec

            | Field | Value |
            |---|---|
            | Brief | `${{ steps.brief.outputs.file }}` |
            | Spec | `${{ env.spec_file }}` |
            | Generator | `claude-api` |
            | Status | `draft` — awaiting analyst review |

            **Next steps:**
            1. Review spec for accuracy
            2. Fill any `NEEDS_CLARIFICATION` fields
            3. Approve and merge
          labels: "spec,auto-generated,needs-review"

      - name: Run schema drift check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "=== Restoring spec file for drift check ==="
          SPEC_FILE="${{ env.spec_file }}"
          BRANCH="spec/auto-fb-${{ steps.brief.outputs.file }}"

          # Fetch the PR branch and restore the spec file to disk
          git fetch origin "$BRANCH"
          git checkout "origin/$BRANCH" -- "$SPEC_FILE"

          echo "=== Specs on disk ==="
          ls specs/

          echo "=== Baseline spec_ids ==="
          cat schema-baseline.json | grep spec_id || echo "(no baseline spec_ids yet)"

          echo "=== Running diff ==="
          set +e
          node agents/schema-guardian/diff.js 2>&1 > /tmp/drift-report.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/drift-report.txt

          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)

          if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
            gh pr comment "$PR_NUMBER" --body "$(cat /tmp/drift-report.txt)"
            echo "Posted drift report to PR #$PR_NUMBER"
          else
            echo "No PR found — drift report logged above"
          fi

          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "Breaking schema changes detected."
            exit 1
          fi
