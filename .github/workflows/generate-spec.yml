name: Generate Spec from Brief

on:
  push:
    paths:
      - "specs/briefs/FB-*.md"
  workflow_dispatch:
    inputs:
      brief_file:
        description: "Path to feature brief (e.g. specs/briefs/FB-002.md)"
        required: true
        type: string

jobs:
  generate-spec:
    name: Generate analytics spec
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agents/spec-generator/package-lock.json

      - name: Install agent dependencies
        working-directory: agents/spec-generator
        run: npm ci

      - name: Determine brief file
        id: brief
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "file=${{ inputs.brief_file }}" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'specs/briefs/' | grep '^specs/briefs/FB-.*\.md$' | head -1)
            echo "Detected brief file: $CHANGED"
            if [[ -z "$CHANGED" ]]; then
              echo "ERROR: No FB-*.md brief file detected in this commit"
              exit 1
            fi
            echo "file=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate spec YAML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BRIEF_FILE="${{ steps.brief.outputs.file }}"
          BRIEF_NUM=$(echo "$BRIEF_FILE" | grep -oP '(?<=FB-)\d+')
          YEAR=$(date +%Y)

          # Generate to a temp file first
          TEMP_FILE="specs/temp-spec.yaml"
          if ! node agents/spec-generator/run.js --brief-file "$BRIEF_FILE" > "$TEMP_FILE"; then
            echo "--- spec generator failed, file contents ---"
            cat "$TEMP_FILE"
            exit 1
          fi

          # Extract first event name from generated YAML
          EVENT_NAME=$(grep -m1 '^\s*- name:' "$TEMP_FILE" | sed 's/.*name:\s*//' | tr -d '"' | tr -d "'" | xargs)

          # Build final filename: SPEC-2026-002-click_outbound_navigation.yaml
          if [[ -n "$EVENT_NAME" ]]; then
            SPEC_FILE="specs/SPEC-${YEAR}-$(printf '%03d' $BRIEF_NUM)-${EVENT_NAME}.yaml"
          else
            SPEC_FILE="specs/SPEC-${YEAR}-$(printf '%03d' $BRIEF_NUM).yaml"
          fi

          mv "$TEMP_FILE" "$SPEC_FILE"

          echo "Brief : $BRIEF_FILE"
          echo "Event : $EVENT_NAME"
          echo "Output: $SPEC_FILE"
          echo "spec_file=$SPEC_FILE" >> "$GITHUB_ENV"

      - name: Open PR with generated spec
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "spec/auto-fb-${{ steps.brief.outputs.file }}"
          commit-message: "feat(spec): auto-generate ${{ env.spec_file }}"
          title: "Auto-spec: ${{ env.spec_file }}"
          body: |
            ## Auto-generated spec

            | Field | Value |
            |---|---|
            | Brief | `${{ steps.brief.outputs.file }}` |
            | Spec | `${{ env.spec_file }}` |
            | Generator | `claude-api` |
            | Status | `draft` — awaiting analyst review |

            **Next steps:**
            1. Review spec for accuracy
            2. Fill any `NEEDS_CLARIFICATION` fields
            3. Approve and merge
          labels: "spec,auto-generated,needs-review"
