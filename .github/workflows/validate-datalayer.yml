name: Validate dataLayer

# Triggered on every PR to main (full regression), or manually via workflow_dispatch
# to test a single event against a live URL.
#
# PR description convention:
#   TEST_URL: https://preview.example.com
#   TEST_USERNAME: staging        (optional)
#   TEST_PASSWORD: abc123         (optional)
#
# Manual run inputs:
#   test_url      — required
#   event_name    — optional; if set, only runs playwright-datalayer-tests/[event_name].spec.js
#   test_username — optional
#   test_password — optional

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      test_url:
        description: 'Live URL to test against (e.g. https://mysite.com)'
        required: true
      event_name:
        description: 'Event to test (e.g. page_view). Leave blank to run all tests.'
        required: false
        default: ''
      test_username:
        description: 'Basic auth username (optional)'
        required: false
        default: ''
      test_password:
        description: 'Basic auth password (optional)'
        required: false
        default: ''

jobs:
  validate-datalayer:
    name: Playwright dataLayer validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Extract inputs ───────────────────────────────────────────────────────
      - name: Extract TEST_URL and credentials
        id: extract-url
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TEST_URL="${{ github.event.inputs.test_url }}"
            TEST_USERNAME="${{ github.event.inputs.test_username }}"
            TEST_PASSWORD="${{ github.event.inputs.test_password }}"
            EVENT_NAME="${{ github.event.inputs.event_name }}"
          else
            TEST_URL=$(echo "$PR_BODY" | grep -oP '(?<=TEST_URL:\s)https?://[^\s]+' | head -1)
            TEST_USERNAME=$(echo "$PR_BODY" | grep -oP '(?<=TEST_USERNAME:\s)\S+' | head -1 || true)
            TEST_PASSWORD=$(echo "$PR_BODY" | grep -oP '(?<=TEST_PASSWORD:\s)\S+' | head -1 || true)
            EVENT_NAME=""
          fi

          if [ -z "$TEST_URL" ]; then
            echo "::error::No TEST_URL provided."
            exit 1
          fi

          echo "TEST_URL=$TEST_URL" >> $GITHUB_OUTPUT
          echo "TEST_USERNAME=$TEST_USERNAME" >> $GITHUB_OUTPUT
          echo "TEST_PASSWORD=$TEST_PASSWORD" >> $GITHUB_OUTPUT
          echo "EVENT_NAME=$EVENT_NAME" >> $GITHUB_OUTPUT
          echo "Using TEST_URL: $TEST_URL"
          if [ -n "$EVENT_NAME" ]; then
            echo "Testing single event: $EVENT_NAME"
          else
            echo "Running full regression — all events"
          fi

      # ── Resolve which test file(s) to run ───────────────────────────────────
      - name: Resolve test target
        id: test-target
        run: |
          EVENT_NAME="${{ steps.extract-url.outputs.EVENT_NAME }}"
          if [ -n "$EVENT_NAME" ]; then
            TEST_FILE="playwright-datalayer-tests/${EVENT_NAME}.spec.js"
            if [ ! -f "$TEST_FILE" ]; then
              echo "::error::Test file not found: $TEST_FILE"
              echo "::error::Run the 'Generate Docs and Tests' workflow first for this event."
              exit 1
            fi
            echo "target=$TEST_FILE" >> $GITHUB_OUTPUT
            echo "Resolved test file: $TEST_FILE"
          else
            echo "target=playwright-datalayer-tests/" >> $GITHUB_OUTPUT
            echo "Resolved test target: all files in playwright-datalayer-tests/"
          fi

      # ── Node + Playwright setup ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Run Playwright dataLayer tests
        id: playwright
        env:
          TEST_URL: ${{ steps.extract-url.outputs.TEST_URL }}
          TEST_USERNAME: ${{ steps.extract-url.outputs.TEST_USERNAME }}
          TEST_PASSWORD: ${{ steps.extract-url.outputs.TEST_PASSWORD }}
        run: |
          npx playwright test \
            ${{ steps.test-target.outputs.target }} \
            --config=playwright.config.js \
            --reporter=list,html

      # ── Upload report on failure ────────────────────────────────────────────
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Summarise result
        if: always()
        run: |
          EVENT_NAME="${{ steps.extract-url.outputs.EVENT_NAME }}"
          SCOPE="${EVENT_NAME:-all events}"

          if [ "${{ steps.playwright.outcome }}" == "success" ]; then
            echo "## ✅ dataLayer validation passed" >> $GITHUB_STEP_SUMMARY
            echo "Tested: \`$SCOPE\` against \`${{ steps.extract-url.outputs.TEST_URL }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**A5 (GTM config generation) is now unblocked.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ dataLayer validation failed" >> $GITHUB_STEP_SUMMARY
            echo "Tested: \`$SCOPE\` against \`${{ steps.extract-url.outputs.TEST_URL }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the Playwright report from the Artifacts section for details." >> $GITHUB_STEP_SUMMARY
          fi
