name: Generate Implementation Docs

# ── Triggers ─────────────────────────────────────────────────────────────────
#
# Fires when a spec YAML is merged (pushed) to main.
# Only specs matching specs/SPEC-*.yaml are processed.
# A separate job runs per changed spec file.

on:
  push:
    branches:
      - main
    paths:
      - "specs/SPEC-*.yaml"

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  # Useful for regenerating docs without re-merging a spec.
  workflow_dispatch:
    inputs:
      spec_path:
        description: "Path to spec file (e.g. specs/SPEC-2025-001.yaml)"
        required: true
        type: string

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    name: Generate Docs → ${{ matrix.spec }}
    runs-on: ubuntu-latest

    # Build a matrix of changed spec files so each runs independently.
    # On workflow_dispatch, we use the manually provided spec path.
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.spec_path)) || fromJson(needs.detect-specs.outputs.specs) }}

    # The detect-specs job runs first on push events to find which YAML
    # files changed. On workflow_dispatch we skip it.
    needs: ${{ github.event_name == 'push' && 'detect-specs' || '' }}
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-specs.outputs.has_specs == 'true' }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit to diff changed files

      # ── 2. Setup Node ────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agents/doc-generator/package.json

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install doc-generator dependencies
        working-directory: agents/doc-generator
        run: npm install

      # ── 4. Run doc generator ─────────────────────────────────────────────────
      - name: Generate implementation docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: implementation
        run: |
          echo "Processing spec: ${{ matrix.spec }}"
          node agents/doc-generator/run.js --spec "${{ matrix.spec }}"

      # ── 5. Check for new/changed docs ────────────────────────────────────────
      - name: Check for generated files
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain implementation/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git status --short implementation/
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to implementation/ — docs may already be up to date."
          fi

      # ── 6. Create branch + commit ────────────────────────────────────────────
      - name: Commit generated docs
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          SPEC_SLUG=$(basename "${{ matrix.spec }}" .yaml | tr '[:upper:]' '[:lower:]')
          BRANCH="docs/auto-${SPEC_SLUG}-$(date +%Y%m%d%H%M%S)"
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add implementation/
          git commit -m "docs(auto): generate implementation docs for ${SPEC_SLUG}

          Source spec: ${{ matrix.spec }}
          Generated by: analytics-cicd/doc-generator
          Triggered by: ${{ github.actor }}"

          git push origin "$BRANCH"

      # ── 7. Open PR ───────────────────────────────────────────────────────────
      - name: Open pull request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPEC_SLUG=$(basename "${{ matrix.spec }}" .yaml)
          GENERATED_FILES=$(git diff --name-only HEAD~1 HEAD -- implementation/ 2>/dev/null || git diff --name-only origin/main HEAD -- implementation/)

          gh pr create \
            --title "docs(auto): Implementation docs for ${SPEC_SLUG}" \
            --body "## Auto-generated Implementation Docs

          This PR was created automatically by the **doc-generator** workflow after \`${{ matrix.spec }}\` was merged to \`main\`.

          ### What's in this PR
          $(echo "$GENERATED_FILES" | sed 's/^/- \`/' | sed 's/$/\`/')

          ### Review checklist
          - [ ] Plain-English event descriptions are accurate
          - [ ] Trigger rules match the spec
          - \`dataLayer.push()\` snippet compiles without errors
          - [ ] Parameter table is complete (all required fields present)
          - [ ] Edge cases are correctly documented

          ### Source spec
          \`${{ matrix.spec }}\`

          > ⚠️ These docs are auto-generated. Do not edit them directly — update the spec and re-trigger this workflow." \
            --base main \
            --head "$BRANCH" \
            --label "auto-generated,documentation"

  # ── Detect changed specs (push events only) ───────────────────────────────
  detect-specs:
    name: Detect changed specs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      specs: ${{ steps.detect.outputs.specs }}
      has_specs: ${{ steps.detect.outputs.has_specs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed spec files
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'specs/SPEC-*.yaml' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "specs=${CHANGED}" >> $GITHUB_OUTPUT

          COUNT=$(echo "$CHANGED" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
            echo "Found ${COUNT} changed spec(s): ${CHANGED}"
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "No spec files changed in this push."
          fi
