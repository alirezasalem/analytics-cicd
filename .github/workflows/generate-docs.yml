name: Generate Implementation Docs

on:
  push:
    branches:
      - main
    paths:
      - "specs/SPEC-*.yaml"

  workflow_dispatch:
    inputs:
      spec_path:
        description: "Path to spec file (e.g. specs/SPEC-2026-004-view_cart.yaml)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-specs:
    name: Detect changed specs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      specs: ${{ steps.detect.outputs.specs }}
      has_specs: ${{ steps.detect.outputs.has_specs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed spec files
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'specs/SPEC-*.yaml' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          COUNT=$(echo "$CHANGED" | jq 'length')
          echo "specs=${CHANGED}" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
          fi

  generate-docs-on-push:
    name: Generate Docs (push)
    runs-on: ubuntu-latest
    needs: detect-specs
    if: needs.detect-specs.outputs.has_specs == 'true'
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.detect-specs.outputs.specs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: agents/doc-generator
        run: npm install
      - name: Generate docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: implementation
        run: node agents/doc-generator/run.js --spec "${{ matrix.spec }}"
      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain implementation/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          SPEC_SLUG=$(basename "${{ matrix.spec }}" .yaml | tr '[:upper:]' '[:lower:]')
          BRANCH="docs/auto-${SPEC_SLUG}-$(date +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add implementation/
          git commit -m "docs(auto): generate implementation docs for ${SPEC_SLUG}"
          git push origin "$BRANCH"
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          echo "SPEC_SLUG=${SPEC_SLUG}" >> $GITHUB_ENV
      - name: Open PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "docs(auto): Implementation docs for ${{ env.SPEC_SLUG }}" \
            --body "Auto-generated by doc-generator from \`${{ matrix.spec }}\`." \
            --base main \
            --head "${{ env.BRANCH }}"

  generate-docs-on-dispatch:
    name: Generate Docs (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: agents/doc-generator
        run: npm install
      - name: Generate docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: implementation
        run: node agents/doc-generator/run.js --spec "${{ inputs.spec_path }}"
      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain implementation/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          SPEC_SLUG=$(basename "${{ inputs.spec_path }}" .yaml | tr '[:upper:]' '[:lower:]')
          BRANCH="docs/auto-${SPEC_SLUG}-$(date +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add implementation/
          git commit -m "docs(auto): generate implementation docs for ${SPEC_SLUG}"
          git push origin "$BRANCH"
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          echo "SPEC_SLUG=${SPEC_SLUG}" >> $GITHUB_ENV
      - name: Open PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "docs(auto): Implementation docs for ${{ env.SPEC_SLUG }}" \
            --body "Auto-generated by doc-generator from \`${{ inputs.spec_path }}\`." \
            --base main \
            --head "${{ env.BRANCH }}"
