name: CI Validate

on:
  push:
    paths:
      - "specs/**/*.yaml"
  pull_request:
    paths:
      - "specs/**/*.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install linter dependencies
        working-directory: scripts/linter
        run: npm install
      - name: Run spec linter
        run: |
          for f in specs/*.yaml; do
            [ -f "$f" ] || continue
            node scripts/linter/spec-linter.js "$f"
          done
