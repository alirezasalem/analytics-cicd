# ─────────────────────────────────────────────────────────────────────────────
# events-spec.yaml — Official Tracking Spec
# Analytics CI/CD — Visable Events Tracking
#
# Spec ID:       SPEC-001
# Feature Brief: FB-001
# GA4 alignment: All event names follow GA4 recommended events schema exactly.
#                Custom events (no GA4 equivalent) are marked with # [custom].
# ─────────────────────────────────────────────────────────────────────────────

spec_id: "SPEC-001"
spec_version: "1.0.0"
status: approved
feature_brief: "FB-001"
owner: "Web Analytics Team"
created_at: "2026-04-17"
updated_at: "2026-04-17"

events:

  # ── 1. page_view ──────────────────────────────────────────────────────────
  # GA4 type: auto-collected (enhanced measurement)
  - name: page_view
    trigger: >
      Auto-collected by GA4 on every page navigation. Also fired manually on
      SPA route changes (Nuxt 3 / React) where GA4 does not detect them.
    priority: P0
    notes: >
      Do not fire manually if gtag.js auto-collection is active.
      For SPA: hook into the router and fire only after confirming
      auto-collection is NOT already firing to avoid double-counting.
    parameters:
      - name: page_location
        type: string
        required: true
        example: "https://www.visable.com/en/products/widget-pro"
      - name: page_title
        type: string
        required: true
        example: "Widget Pro — Visable"
      - name: page_referrer
        type: string
        required: false
        example: "https://www.google.com"

  # ── 2. view_item ──────────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: view_item
    trigger: >
      Fire when a product detail page (PDP) reaches full visibility —
      product title and price are rendered in the viewport.
      Do NOT fire on list pages (use view_item_list for those).
    priority: P0
    notes: >
      Use Intersection Observer with a 500ms dwell threshold to avoid
      accidental fires on scroll-through.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 49.99
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99}]"

  # ── 3. view_item_list ─────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: view_item_list
    trigger: >
      Fire when a product list (category page, search results, recommendations)
      enters the viewport. Use Intersection Observer on the list container.
    priority: P1
    notes: >
      Include item_list_id and item_list_name in every item object.
      Limit items array to products actually visible, not the full page result set.
    parameters:
      - name: item_list_id
        type: string
        required: false
        example: "cat_hydraulics"
      - name: item_list_name
        type: string
        required: false
        example: "Hydraulics Category"
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', item_list_name: 'Hydraulics Category'}]"

  # ── 4. select_item ────────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: select_item
    trigger: >
      Fire when a user clicks a product card from any list view
      (category page, search results, recommendations).
    priority: P1
    notes: >
      This event bridges view_item_list → view_item in the funnel.
      Include the same item_list_id and item_list_name used in view_item_list.
    parameters:
      - name: item_list_id
        type: string
        required: false
        example: "cat_hydraulics"
      - name: item_list_name
        type: string
        required: false
        example: "Hydraulics Category"
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99}]"

  # ── 5. add_to_cart ────────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: add_to_cart
    trigger: >
      Fire on successful API response (HTTP 200) from the cart service
      after the user clicks "Add to cart". Do NOT fire on button click.
    priority: P0
    notes: >
      Deduplication: check sessionStorage for key atc_{item_id}_{timestamp_bucket}
      to avoid double-fires on retry.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 49.99
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 1}]"

  # ── 6. remove_from_cart ───────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: remove_from_cart
    trigger: >
      Fire on successful API response (HTTP 200) from the cart service
      after the user removes an item (trash icon or quantity → 0).
    priority: P1
    notes: Capture the item price at time of removal, not current catalogue price.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 49.99
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 1}]"

  # ── 7. begin_checkout ─────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: begin_checkout
    trigger: >
      Fire when the user lands on checkout step 1.
      Fire once per checkout session — not on each step change.
    priority: P0
    notes: >
      Use sessionStorage key checkout_started_{cart_id} to prevent
      re-firing if user navigates back and forward in checkout.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 149.97
      - name: coupon
        type: string
        required: false
        example: "SUMMER20"
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 3}]"

  # ── 8. add_shipping_info ──────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: add_shipping_info
    trigger: >
      Fire when the user submits their shipping details and advances
      to the next checkout step.
    priority: P1
    notes: Include shipping_tier if multiple delivery options exist.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 149.97
      - name: coupon
        type: string
        required: false
        example: "SUMMER20"
      - name: shipping_tier
        type: string
        required: false
        example: "express"
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 3}]"

  # ── 9. add_payment_info ───────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: add_payment_info
    trigger: >
      Fire when the user submits their payment details and advances
      to the order review / confirmation step.
    priority: P1
    notes: Do not log card numbers or any PII in parameters.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 149.97
      - name: coupon
        type: string
        required: false
        example: "SUMMER20"
      - name: payment_type
        type: string
        required: false
        example: "credit_card"
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 3}]"

  # ── 10. purchase ──────────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event (conversion)
  - name: purchase
    trigger: >
      Fire on the order confirmation page, only after verifying
      transaction_id has not been fired before. Source of truth:
      order confirmation API response, not the URL.
    priority: P0
    notes: >
      Critical deduplication: check localStorage for purchased_{transaction_id}
      before firing. If found, skip. If not found, fire and write the key.
      This prevents double-counting on page reload.
    parameters:
      - name: transaction_id
        type: string
        required: true
        example: "ORDER-20260417-001"
      - name: value
        type: number
        required: true
        example: 149.97
      - name: tax
        type: number
        required: false
        example: 23.99
      - name: shipping
        type: number
        required: false
        example: 5.99
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: coupon
        type: string
        required: false
        example: "SUMMER20"
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 3}]"

  # ── 11. refund ────────────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: refund
    trigger: >
      Fire when a refund is confirmed in the order management system.
      Preferred: server-side via GTM server container.
      Fallback: client-side from a refund confirmation page.
    priority: P2
    notes: >
      Apply same transaction_id deduplication as purchase event.
      For partial refunds, include only the refunded items in the items array.
    parameters:
      - name: transaction_id
        type: string
        required: true
        example: "ORDER-20260417-001"
      - name: value
        type: number
        required: true
        example: 49.99
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: items
        type: array
        required: false
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99, quantity: 1}]"

  # ── 12. login ─────────────────────────────────────────────────────────────
  # GA4 type: recommended event
  - name: login
    trigger: >
      Fire on successful authentication — after the auth API returns HTTP 200
      and a session token is issued. Not on button click.
    priority: P1
    notes: Do not fire on silent token refresh / auto re-authentication.
    parameters:
      - name: method
        type: enum
        required: true
        values: ["email", "google", "linkedin", "apple", "sso"]
        example: "email"

  # ── 13. sign_up ───────────────────────────────────────────────────────────
  # GA4 type: recommended event
  - name: sign_up
    trigger: >
      Fire on successful account creation — after the registration API
      returns HTTP 201 and the user session is established.
    priority: P1
    notes: >
      Do not fire on social login that silently creates a new account.
      For those flows, fire login with the appropriate method value.
    parameters:
      - name: method
        type: enum
        required: true
        values: ["email", "google", "linkedin", "apple", "sso"]
        example: "email"

  # ── 14. search ────────────────────────────────────────────────────────────
  # GA4 type: recommended event
  - name: search
    trigger: >
      Fire when the user submits a search query (Enter key or search button click).
      Also fire on page load if search_term is present in URL parameters.
    priority: P1
    notes: >
      Only on submit — not on every keystroke.
      Sanitise PII: strip email addresses and phone numbers from search_term
      before pushing to dataLayer.
    parameters:
      - name: search_term
        type: string
        required: true
        example: "hydraulic pump"
      - name: search_results_count
        type: number
        required: false
        example: 142

  # ── 15. add_to_wishlist ───────────────────────────────────────────────────
  # GA4 type: recommended event
  - name: add_to_wishlist
    trigger: >
      Fire on successful API response after user saves a product to their wishlist.
    priority: P2
    notes: No GA4 equivalent for remove_from_wishlist — use a custom event if needed.
    parameters:
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: value
        type: number
        required: true
        example: 49.99
      - name: items
        type: array
        required: true
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro', price: 49.99}]"

  # ── 16. view_promotion ────────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: view_promotion
    trigger: >
      Fire when a promotional banner or product promotion enters the viewport.
      Use Intersection Observer with 50% visibility threshold.
    priority: P2
    notes: >
      Include creative_name and creative_slot to identify which banner
      variant drove the engagement. Essential for A/B test measurement.
    parameters:
      - name: creative_name
        type: string
        required: false
        example: "summer_sale_banner_v2"
      - name: creative_slot
        type: string
        required: false
        example: "homepage_hero"
      - name: promotion_id
        type: string
        required: false
        example: "PROMO-SUMMER-2026"
      - name: promotion_name
        type: string
        required: false
        example: "Summer Sale 2026"
      - name: items
        type: array
        required: false
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro'}]"

  # ── 17. select_promotion ──────────────────────────────────────────────────
  # GA4 type: recommended ecommerce event
  - name: select_promotion
    trigger: >
      Fire when a user clicks on a promotional banner or promotion element.
    priority: P2
    notes: >
      Use same creative_name, creative_slot, promotion_id values as the
      corresponding view_promotion event for funnel continuity.
    parameters:
      - name: creative_name
        type: string
        required: false
        example: "summer_sale_banner_v2"
      - name: creative_slot
        type: string
        required: false
        example: "homepage_hero"
      - name: promotion_id
        type: string
        required: false
        example: "PROMO-SUMMER-2026"
      - name: promotion_name
        type: string
        required: false
        example: "Summer Sale 2026"
      - name: items
        type: array
        required: false
        example: "[{item_id: 'SKU-001', item_name: 'Widget Pro'}]"

  # ── 18. share ─────────────────────────────────────────────────────────────
  # GA4 type: recommended event
  - name: share
    trigger: >
      Fire when a user shares a product or page using a share button
      (email, WhatsApp, copy link, social media).
    priority: P2
    notes: content_id should be the product SKU or page slug.
    parameters:
      - name: method
        type: enum
        required: true
        values: ["email", "whatsapp", "copy_link", "linkedin", "twitter", "facebook"]
        example: "copy_link"
      - name: content_type
        type: string
        required: true
        example: "product"
      - name: content_id
        type: string
        required: true
        example: "SKU-001"

  # ── 19. file_download ─────────────────────────────────────────────────────
  # GA4 type: enhanced measurement (auto-collected if enabled in GA4)
  - name: file_download
    trigger: >
      Auto-collected by GA4 enhanced measurement for common file types
      (.pdf, .xlsx, .docx, .zip). Also fire manually for file types
      not covered by auto-collection.
    priority: P2
    notes: >
      Check GA4 enhanced measurement settings before implementing manually —
      you may already be collecting this without code changes.
    parameters:
      - name: file_name
        type: string
        required: true
        example: "product-catalog-2026.pdf"
      - name: file_extension
        type: string
        required: true
        example: "pdf"
      - name: link_url
        type: string
        required: false
        example: "https://www.visable.com/downloads/catalog-2026.pdf"
