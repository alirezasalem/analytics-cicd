spec_id: SPEC-2026-001-cart_page_view
generated_by: claude-api
status: draft
spec_version: "1.0.0"
feature_brief: "FB-cart-page-view-tracking"
owner: "Commerce"
created_at: "2026-04-17"
updated_at: "2026-04-17"

events:
  - name: view_cart
    trigger: "On page load of /cart when cart contains at least one item"
    priority: P1
    parameters:
      - name: value
        type: currency
        required: true
        example: 89.97
        currency_param: currency
      - name: currency
        type: string
        required: true
        example: "EUR"
      - name: items
        type: array
        required: true
        example: [{"item_id": "SKU123", "item_name": "Wireless Headphones", "price": 49.99, "quantity": 1}, {"item_id": "SKU456", "item_name": "Phone Case", "price": 19.99, "quantity": 2}]
      - name: item_count
        type: number
        required: true
        example: 3
      - name: coupon
        type: string
        required: false
        example: "SAVE10"
    notes: "Fire once per page load only. Use sessionStorage flag cart_viewed_{session_id} to prevent duplicate events on re-renders. Do not fire if cart is empty. Read cart data from single source of truth object used at checkout."
