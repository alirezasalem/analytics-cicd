version: 1.0.0
status: draft
owner: Product Analytics Team
feature_brief_ref: FB-add-payment-info-tracking
generated_by: claude-api-agent
created_at: 2026-01-27

events:
  - name: add_payment_info
    trigger:
      action: custom
      selector: "NEEDS_CLARIFICATION: payment submission button selector not specified"
      page_path: /checkout/payment
    parameters:
      payment_type: "DL - payment_type"
      value: "DL - cart_total"
      currency: "DL - currency"
      coupon: "DL - coupon_code"
      items: "DL - cart_items"
    dataLayer:
      event: add_payment_info
      ecommerce:
        currency: "{{DL - currency}}"
        value: "{{DL - cart_total}}"
        coupon: "{{DL - coupon_code}}"
        payment_type: "{{DL - payment_type}}"
        items: "{{DL - cart_items}}"
    ga4_mapping:
      event_name: add_payment_info
      custom_dimensions:
        cd_payment_type: "{{DL - payment_type}}"
        cd_coupon_applied: "{{DL - coupon_code}}"
    gtm_notes: "Fire only after successful payment validation. Must execute before any redirect to external payment providers. Use custom event trigger based on dataLayer push."

acceptance_criteria:
  - "Event fires only after successful payment method validation, not on raw button click"
  - "payment_type parameter correctly identifies method (credit_card, paypal, applepay, etc.)"
  - "Event fires before any external payment provider redirects"
  - "No PII or sensitive payment data captured in any parameters"
  - "items array contains complete product details for all cart items"
  - "Verified in GA4 DebugView with proper ecommerce structure"

pii_risk: true
pii_mitigation: "Strictly prohibited to capture card numbers, CVV, expiration dates, or bank details. Only generic payment_type string allowed."
